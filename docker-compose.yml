version: '3.9'

services:

  transaction-api:
    build: ./transaction-api
    container_name: transaction-api
    ports:
      - "8081:8081"

  gateway-api:
    build: ./transaction-gateway-api
    container_name: gateway-api
    ports:
      - "8082:8082"
    depends_on:
      - transaction-api
    environment:
      - SPRING_PROFILES_ACTIVE=docker

  frontend:
    build: ./frontend-react
    container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      - gateway-api
