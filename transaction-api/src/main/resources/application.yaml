server:
  port: 8081

spring:
  application:
    name: transaction-api

  datasource:
    url: jdbc:h2:mem:transactionsdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update